<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Recreation</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    svg {
      width: 640px;
      height: 360px;
      display: block;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
    <!-- Small top vertical line -->
    <line
      x1="320"
      y1="82"
      x2="320"
      y2="122"
      stroke="#f6d400"
      stroke-width="6"
      stroke-linecap="round"
    />
    <line
      x1="320"
      y1="82"
      x2="320"
      y2="122"
      stroke="white"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.85"
    />

    <!-- Main V logo -->
    <polygon
      points="225,80 320,180 415,80 320,315"
      fill="#f6d400"
      stroke="white"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </svg>
</body>
</html>
